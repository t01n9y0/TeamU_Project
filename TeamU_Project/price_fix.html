<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>調整單價計算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    input { color-scheme: dark; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <main class="max-w-7xl mx-auto p-4 md:p-8">
    <section class="rounded-3xl bg-zinc-900 border border-zinc-800 shadow-xl p-6 mb-5">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight">廷豐專用_調整單價計算器</h1>
          <p class="text-zinc-400 mt-2 text-sm">自動尋找最接近 0 的補償項目，單價固定小數後兩位。</p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <button onclick="addRow()" class="px-4 py-2 rounded-xl bg-zinc-100 text-zinc-950 hover:bg-white font-semibold">新增品項</button>
          <button onclick="resetSample()" class="px-4 py-2 rounded-xl bg-zinc-800 text-zinc-100 hover:bg-zinc-700 border border-zinc-700">載入範例</button>
          <button onclick="exportExcel()" class="px-4 py-2 rounded-xl bg-pink-500 text-white hover:bg-pink-600 font-semibold">匯出 Excel</button>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-5">
      <div class="rounded-2xl bg-zinc-900 border border-zinc-800 p-5">
        <label class="block text-xs font-semibold text-zinc-400 mb-2">目標總價</label>
        <input id="targetTotal" type="number" step="0.01" value="2408680" oninput="calculate()" class="w-full text-2xl font-bold bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500" />
      </div>
      <div class="rounded-2xl bg-zinc-900 border border-zinc-800 p-5">
        <label class="block text-xs font-semibold text-zinc-400 mb-2">自動補償項目</label>
        <div id="bestItem" class="text-2xl font-bold rounded-xl px-4 py-3 bg-zinc-950 border border-zinc-700 truncate">—</div>
      </div>
      <div class="rounded-2xl bg-zinc-900 border border-zinc-800 p-5">
        <label class="block text-xs font-semibold text-zinc-400 mb-2">調整後總價</label>
        <div id="adjustedTotalCard" class="text-2xl font-bold rounded-xl px-4 py-3 bg-zinc-950 border border-zinc-700">0.00</div>
      </div>
      <div class="rounded-2xl bg-zinc-900 border border-zinc-800 p-5">
        <label class="block text-xs font-semibold text-zinc-400 mb-2">目標差額</label>
        <div id="diffBox" class="text-2xl font-bold rounded-xl px-4 py-3 bg-zinc-950 border border-zinc-700">0.00</div>
      </div>
    </section>

    <section class="rounded-3xl bg-zinc-900 border border-zinc-800 shadow-xl p-4 md:p-5 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm border-collapse min-w-[1120px]">
          <thead>
            <tr class="bg-zinc-800 text-zinc-300">
              <th class="p-3 text-left border border-zinc-700 w-16">列</th>
              <th class="p-3 text-left border border-zinc-700">品項</th>
              <th class="p-3 text-right border border-zinc-700 w-28">數量</th>
              <th class="p-3 text-right border border-zinc-700 w-32">原單價</th>
              <th class="p-3 text-right border border-zinc-700 w-36">原複價</th>
              <th class="p-3 text-right border border-zinc-700 w-36">調整後單價</th>
              <th class="p-3 text-right border border-zinc-700 w-36">調整後複價</th>
              <th class="p-3 text-right border border-zinc-700 w-28">降幅</th>
              <th class="p-3 text-center border border-zinc-700 w-24">補償</th>
              <th class="p-3 text-center border border-zinc-700 w-24">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
          <tfoot>
            <tr class="bg-zinc-950 font-bold text-zinc-100">
              <td colspan="4" class="p-3 border border-zinc-700 text-right">合計</td>
              <td id="originalTotal" class="p-3 border border-zinc-700 text-right">0.00</td>
              <td class="p-3 border border-zinc-700 text-right">—</td>
              <td id="adjustedTotal" class="p-3 border border-zinc-700 text-right">0.00</td>
              <td id="overallDiscount" class="p-3 border border-zinc-700 text-right">0.00%</td>
              <td class="p-3 border border-zinc-700"></td>
              <td class="p-3 border border-zinc-700"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </section>
  </main>

  <script>
    let rows = [
      { item: "搜救服", qty: 220, unit: 683.68 },
      { item: "搜救帽", qty: 220, unit: 143.16 },
      { item: "搜救鞋", qty: 220, unit: 1050.53 },
      { item: "救災背心", qty: 220, unit: 578.95 },
      { item: "雨衣", qty: 220, unit: 315.79 },
      { item: "手套", qty: 220, unit: 73.68 },
      { item: "頭燈", qty: 220, unit: 210.53 },
      { item: "反光帶", qty: 220, unit: 52.63 },
      { item: "哨子", qty: 220, unit: 31.58 },
      { item: "搜救小帽", qty: 220, unit: 126.32 },
      { item: "識別證套", qty: 220, unit: 26.32 }
    ];

    let currentResult = null;

    function money(value) {
      return Number(value || 0).toLocaleString("zh-TW", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function round2(value) {
      return Math.round((Number(value || 0) + Number.EPSILON) * 100) / 100;
    }

    function getOriginalData() {
      const originalTotals = rows.map(r => round2(Number(r.qty || 0) * Number(r.unit || 0)));
      const originalTotal = round2(originalTotals.reduce((a, b) => a + b, 0));
      return { originalTotals, originalTotal };
    }

    function simulate(compIndex) {
      const target = Number(document.getElementById("targetTotal").value || 0);
      const { originalTotals, originalTotal } = getOriginalData();
      let adjustedUnits = new Array(rows.length).fill(0);
      let adjustedTotals = new Array(rows.length).fill(0);

      rows.forEach((row, index) => {
        if (index === compIndex) return;
        adjustedUnits[index] = originalTotal ? round2(Number(row.unit || 0) * target / originalTotal) : 0;
        adjustedTotals[index] = round2(Number(row.qty || 0) * adjustedUnits[index]);
      });

      const otherAdjustedTotal = round2(adjustedTotals.reduce((sum, value, index) => index === compIndex ? sum : sum + value, 0));
      const compQty = Number(rows[compIndex]?.qty || 0);
      adjustedUnits[compIndex] = compQty ? round2((target - otherAdjustedTotal) / compQty) : 0;
      adjustedTotals[compIndex] = round2(compQty * adjustedUnits[compIndex]);

      const adjustedTotal = round2(adjustedTotals.reduce((a, b) => a + b, 0));
      const diff = round2(target - adjustedTotal);
      return { compIndex, originalTotals, originalTotal, adjustedUnits, adjustedTotals, adjustedTotal, diff };
    }

    function findBestResult() {
      if (!rows.length) return null;
      let best = simulate(0);
      for (let i = 1; i < rows.length; i++) {
        const result = simulate(i);
        const betterAbs = Math.abs(result.diff) < Math.abs(best.diff);
        const sameAbsButSmallerUnitChange = Math.abs(result.diff) === Math.abs(best.diff) && Math.abs(result.adjustedUnits[i] - rows[i].unit) < Math.abs(best.adjustedUnits[best.compIndex] - rows[best.compIndex].unit);
        if (betterAbs || sameAbsButSmallerUnitChange) best = result;
      }
      return best;
    }

    function renderTable() {
      const body = document.getElementById("tableBody");
      body.innerHTML = "";
      rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-zinc-800/70 transition";
        tr.innerHTML = `
          <td class="p-2 border border-zinc-800 text-center font-semibold text-zinc-300">${index + 1}</td>
          <td class="p-2 border border-zinc-800"><input value="${escapeHtml(row.item)}" oninput="updateRow(${index}, 'item', this.value)" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-pink-500" /></td>
          <td class="p-2 border border-zinc-800"><input type="number" step="1" value="${row.qty}" oninput="updateRow(${index}, 'qty', this.value)" class="w-full text-right bg-zinc-950 border border-zinc-700 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-pink-500" /></td>
          <td class="p-2 border border-zinc-800"><input type="number" step="0.01" value="${row.unit}" oninput="updateRow(${index}, 'unit', this.value)" class="w-full text-right bg-zinc-950 border border-zinc-700 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-pink-500" /></td>
          <td class="p-2 border border-zinc-800 text-right text-zinc-300" id="orig-${index}">0.00</td>
          <td class="p-2 border border-zinc-800 text-right font-semibold text-pink-400" id="adjUnit-${index}">0.00</td>
          <td class="p-2 border border-zinc-800 text-right font-semibold" id="adjTotal-${index}">0.00</td>
          <td class="p-2 border border-zinc-800 text-right text-zinc-300" id="discount-${index}">0.00%</td>
          <td class="p-2 border border-zinc-800 text-center" id="badge-${index}">—</td>
          <td class="p-2 border border-zinc-800 text-center"><button onclick="removeRow(${index})" class="px-3 py-1 rounded-lg bg-zinc-800 hover:bg-rose-500/80 text-zinc-100">刪除</button></td>
        `;
        body.appendChild(tr);
      });
      calculate();
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateRow(index, key, value) {
      rows[index][key] = key === "item" ? value : Number(value || 0);
      calculate();
    }

    function addRow() {
      rows.push({ item: "新增品項", qty: 1, unit: 0 });
      renderTable();
    }

    function removeRow(index) {
      if (rows.length <= 1) return alert("至少要保留一個品項");
      rows.splice(index, 1);
      renderTable();
    }

    function calculate() {
      currentResult = findBestResult();
      if (!currentResult) return;
      const { compIndex, originalTotals, originalTotal, adjustedUnits, adjustedTotals, adjustedTotal, diff } = currentResult;

      rows.forEach((row, index) => {
        document.getElementById(`orig-${index}`).textContent = money(originalTotals[index]);
        document.getElementById(`adjUnit-${index}`).textContent = money(adjustedUnits[index]);
        document.getElementById(`adjTotal-${index}`).textContent = money(adjustedTotals[index]);
        const discount = originalTotals[index] ? ((originalTotals[index] - adjustedTotals[index]) / originalTotals[index]) * 100 : 0;
        document.getElementById(`discount-${index}`).textContent = `${discount.toFixed(2)}%`;
        document.getElementById(`badge-${index}`).innerHTML = index === compIndex
          ? `<span class="inline-flex items-center px-2.5 py-1 rounded-full bg-pink-500 text-white text-xs font-bold">自動</span>`
          : `<span class="text-zinc-600">—</span>`;
      });

      document.getElementById("originalTotal").textContent = money(originalTotal);
      document.getElementById("adjustedTotal").textContent = money(adjustedTotal);
      document.getElementById("adjustedTotalCard").textContent = money(adjustedTotal);
      document.getElementById("overallDiscount").textContent = originalTotal ? `${(((originalTotal - adjustedTotal) / originalTotal) * 100).toFixed(2)}%` : "0.00%";
      document.getElementById("bestItem").textContent = `${compIndex + 1}｜${rows[compIndex]?.item || "未命名"}`;

      const diffBox = document.getElementById("diffBox");
      diffBox.textContent = money(diff);
      diffBox.className = "text-2xl font-bold rounded-xl px-4 py-3 border " + (Math.abs(diff) <= 0.45
        ? "bg-emerald-500/15 text-emerald-300 border-emerald-500/30"
        : "bg-rose-500/15 text-rose-300 border-rose-500/30");
    }

    function exportExcel() {
      if (!currentResult) currentResult = findBestResult();
      const target = Number(document.getElementById("targetTotal").value || 0);
      const { compIndex, originalTotals, originalTotal, adjustedUnits, adjustedTotals, adjustedTotal, diff } = currentResult;

      const data = rows.map((row, index) => ({
        列號: index + 1,
        品項: row.item,
        數量: row.qty,
        原單價: row.unit,
        原複價: originalTotals[index],
        調整後單價: adjustedUnits[index],
        調整後複價: adjustedTotals[index],
        自動補償項目: index === compIndex ? "是" : ""
      }));
      data.push({ 品項: "原複價合計", 原複價: originalTotal });
      data.push({ 品項: "目標價", 調整後複價: target });
      data.push({ 品項: "調整後合計", 調整後複價: adjustedTotal });
      data.push({ 品項: "目標差額", 調整後複價: diff });

      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "調整後單價");
      XLSX.writeFile(wb, "調整後單價計算表.xlsx");
    }

    function resetSample() {
      rows = [
        { item: "搜救服", qty: 220, unit: 683.68 },
        { item: "搜救帽", qty: 220, unit: 143.16 },
        { item: "搜救鞋", qty: 220, unit: 1050.53 },
        { item: "救災背心", qty: 220, unit: 578.95 },
        { item: "雨衣", qty: 220, unit: 315.79 },
        { item: "手套", qty: 220, unit: 73.68 },
        { item: "頭燈", qty: 220, unit: 210.53 },
        { item: "反光帶", qty: 220, unit: 52.63 },
        { item: "哨子", qty: 220, unit: 31.58 },
        { item: "搜救小帽", qty: 220, unit: 126.32 },
        { item: "識別證套", qty: 220, unit: 26.32 }
      ];
      document.getElementById("targetTotal").value = 2408680;
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
