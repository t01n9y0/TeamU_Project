<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamU_Project</title>
  <style>
    :root {
      --bg1: #03050d;
      --bg2: #090f22;
      --line: rgba(117, 231, 255, 0.24);
      --cyan: #75e7ff;
      --purple: #a46cff;
      --pink: #ff5ce1;
      --text: #eaf6ff;
      --muted: #8aa0bf;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(117, 231, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(164, 108, 255, 0.16), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(255, 92, 225, 0.12), transparent 30%),
        linear-gradient(145deg, var(--bg1), var(--bg2) 58%, #02030a);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(117, 231, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(117, 231, 255, 0.055) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black 42%, transparent 92%);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      left: 50%;
      top: 50%;
      width: 620px;
      height: 620px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(117, 231, 255, 0.15), transparent 68%);
      filter: blur(24px);
      animation: pulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: .58; }
      50% { opacity: .95; }
    }

    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 12% 22%, rgba(255,255,255,.85), transparent 60%),
        radial-gradient(1.5px 1.5px at 25% 78%, rgba(117, 231, 255,.9), transparent 60%),
        radial-gradient(2px 2px at 77% 28%, rgba(255,255,255,.78), transparent 60%),
        radial-gradient(1.5px 1.5px at 86% 72%, rgba(164, 108, 255,.9), transparent 60%),
        radial-gradient(1.2px 1.2px at 52% 56%, rgba(255, 92, 225,.85), transparent 60%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .portal {
      border-radius: 32px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18, 27, 54, 0.76), rgba(6, 10, 24, 0.72));
      backdrop-filter: blur(16px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 0 32px rgba(117, 231, 255, 0.14),
        0 0 80px rgba(164, 108, 255, 0.12);
      overflow: hidden;
    }

    .header {
      padding: 38px 38px 26px;
      border-bottom: 1px solid rgba(117, 231, 255, 0.12);
      position: relative;
    }

    .header::after {
      content: "";
      position: absolute;
      left: 38px;
      right: 38px;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(117,231,255,.75), transparent);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 78px);
      line-height: .95;
      letter-spacing: 1.5px;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ffffff, var(--cyan) 35%, #c7bfff 70%, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(117, 231, 255, 0.2);
    }

    .project-list {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .project-row {
      min-height: 88px;
      display: grid;
      grid-template-columns: 62px 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--text);
      border-radius: 22px;
      border: 1px solid rgba(117, 231, 255, 0.16);
      background: linear-gradient(180deg, rgba(15, 22, 44, 0.86), rgba(7, 11, 25, 0.92));
      position: relative;
      overflow: hidden;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }

    .project-row::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, rgba(117, 231, 255, 0.1), transparent 50%, rgba(164,108,255,0.12));
      opacity: .75;
      pointer-events: none;
    }

    .project-row:hover {
      transform: translateX(8px);
      border-color: rgba(117, 231, 255, 0.5);
      box-shadow: 0 0 30px rgba(117, 231, 255, 0.14);
    }

    .icon, .project-info, .arrow {
      position: relative;
      z-index: 1;
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: rgba(117, 231, 255, 0.08);
      border: 1px solid rgba(117, 231, 255, 0.18);
      filter: drop-shadow(0 0 12px rgba(117, 231, 255, .22));
    }

    .project-name {
      font-size: 22px;
      font-weight: 850;
      letter-spacing: .5px;
    }

    .file-name {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .2px;
    }

    .arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #07111f;
      background: linear-gradient(90deg, var(--cyan), #c6f7ff);
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 0 18px rgba(117, 231, 255, 0.25);
    }

    .add-note {
      margin-top: 4px;
      padding: 15px 18px;
      border-radius: 18px;
      color: rgba(234,246,255,.62);
      border: 1px dashed rgba(117, 231, 255, 0.18);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .wrap { width: min(100% - 20px, 980px); padding: 20px 0; }
      .header { padding: 30px 22px 22px; }
      .header::after { left: 22px; right: 22px; }
      .project-list { padding: 14px; }
      .project-row {
        grid-template-columns: 50px 1fr 36px;
        gap: 12px;
        padding: 14px;
      }
      .icon { width: 46px; height: 46px; font-size: 24px; }
      .project-name { font-size: 18px; }
      .file-name { font-size: 12px; }
      .arrow { width: 36px; height: 36px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <main class="wrap">
    <section class="portal">
      <header class="header">
        <h1>TeamU_Project</h1>
      </header>

      <section class="project-list">
        <a class="project-row" href="fc2code_fix.html">
          <div class="icon">🔎</div>
          <div class="project-info">
            <div class="project-name">FC2代碼快速搜尋</div>
            <div class="file-name">fc2code_fix.html</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="project-row" href="price_fix.html">
          <div class="icon">🧮</div>
          <div class="project-info">
            <div class="project-name">價格補償工具</div>
            <div class="file-name">price_fix.html</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <!-- 新增網站時，複製下面這段，改名稱與 href 檔名即可
        <a class="project-row" href="new_site.html">
          <div class="icon">🚀</div>
          <div class="project-info">
            <div class="project-name">新網站名稱</div>
            <div class="file-name">new_site.html</div>
          </div>
          <div class="arrow">›</div>
        </a>
        -->

        <div class="add-note">測試中...</div>
      </section>
    </section>
  </main>
</body>
</html>
